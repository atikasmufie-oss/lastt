<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk ke Akun</title>
    <style>
        
        { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        body {
            background-color: #a9cfff; /* Biru muda background asli */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.5); /* Efek kaca transparan asli */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 24px; /* Sudut kotak rounded lembut */
            width: 440px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        h2 { 
            color: #2c5282; 
            font-size: 28px;
            margin-bottom: 35px; 
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 20px;
            border: none;
            background: #eef4fe; /* Warna abu-biru inputan asli */
            border-radius: 10px;
            outline: none;
            color: #333;
            font-size: 16px;
        }

        input::placeholder { 
            color: #718096; 
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: #4a90e2; /* Biru cerah tombol Masuk asli */
            border: none;
            color: white;
            font-weight: 700;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            margin-bottom: 25px;
            transition: background 0.2s;
        }

        button:hover { 
            background-color: #357abd;
        }

        .switch-text { 
            font-size: 15px; 
            color: #4a5568; 
            margin-bottom: 20px;
        }

        .switch-text span { 
            color: #1a365d; 
            cursor: pointer; 
            font-weight: 700; 
            text-decoration: underline; 
        }

        .back-link { 
            display: inline-block; 
            font-size: 15px; 
            color: #4a5568; 
            text-decoration: none; 
        }

        .back-link:hover { 
            color: #000; 
        }

        /* Pesan peringatan merah pengganti alert */
        .error-message {
            color: #e53e3e;
            font-size: 14px;
            margin-top: -10px;
            margin-bottom: 15px;
            display: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="login-card">
        
        <div id="loginSection">
            <h2>Masuk Akun</h2>
            <input type="text" id="loginUser" placeholder="Masukkan Username">
            <input type="password" id="loginPass" placeholder="Masukkan Password">
            
            <button onclick="prosesLogin()">Masuk</button>
            <div id="loginError" class="error-message">Username atau Password salah!</div>
            
            <p class="switch-text">Belum punya akun? <span onclick="pindahForm()">Daftar di sini</span></p>
        </div>

        <div id="registerSection" style="display: none;">
            <h2>Daftar Akun</h2>
            <input type="text" id="regUser" placeholder="Buat Username Baru">
            <input type="email" id="regEmail" placeholder="Masukkan Alamat Email"> <input type="password" id="regPass" placeholder="Buat Password Baru">
            
            <button onclick="prosesRegister()">Daftar</button>
            <div id="regError" class="error-message">Semua form wajib diisi!</div>
            
            <p class="switch-text">Sudah punya akun? <span onclick="pindahForm()">Login di sini</span></p>
        </div>

        <a href="../index.html" class="back-link">← Kembali ke Awalan</a>
    </div>

    <script>
        // Fungsi tukar form login & register
        function pindahForm() {
            const login = document.getElementById("loginSection");
            const register = document.getElementById("registerSection");
            
            document.getElementById("loginError").style.display = "none";
            document.getElementById("regError").style.display = "none";

            if (login.style.display === "none") {
                login.style.display = "block";
                register.style.display = "none";
            } else {
                login.style.display = "none";
                register.style.display = "block";
            }
        }

        // Fungsi Daftar Akun Baru + Menyimpan Email
        function prosesRegister() {
            const user = document.getElementById("regUser").value.trim();
            const email = document.getElementById("regEmail").value.trim();
            const pass = document.getElementById("regPass").value.trim();
            const errBox = document.getElementById("regError");

            // Cek kalau ada inputan yang kosong
            if (user === "" || email === "" || pass === "") {
                errBox.style.display = "block";
                return;
            }

            // Simpan data pendaftaran ke browser
            localStorage.setItem("saved_username", user);
            localStorage.setItem("saved_email", email); // Email tersimpan aman
            localStorage.setItem("saved_password", pass);

            // Kosongkan form input
            document.getElementById("regUser").value = "";
            document.getElementById("regEmail").value = "";
            document.getElementById("regPass").value = "";
            
            // Pindah ke form login otomatis tanpa pop-up mengganggu
            pindahForm();
        }

        // Fungsi Login & Otomatis Balik ke Layar Utama Kobo
        function prosesLogin() {
            const userMasuk = document.getElementById("loginUser").value.trim();
            const passMasuk = document.getElementById("loginPass").value.trim();
            const errBox = document.getElementById("loginError");

            const dbUser = localStorage.getItem("saved_username");
            const dbPass = localStorage.getItem("saved_password");

            if (userMasuk === dbUser && passMasuk === dbPass && dbUser !== null) {
                // Beritahu index.html siapa nama user yang login
                localStorage.setItem("loggedInUser", userMasuk);
                
                // LANGSUNG BALIK KE HALAMAN UTAMA (Silent & Mulus)
                window.location.href = "../index.html"; 
            } else {
                errBox.style.display = "block"; // Muncul teks merah kalau salah
            }
        }
    </script>
</body>
</html>
