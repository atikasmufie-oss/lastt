<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Akun</title>
    <style>
        /* ========================================================
           CSS ASLI KAMU (FIX STRUKTUR & TIDAK MEPET)
           ======================================================== */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        body {
            background-color: #a9cfff; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background-color: #d2e6ff; 
            padding: 60px 45px; 
            border-radius: 30px; 
            width: 460px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        h2 { 
            color: #2b569a; 
            font-size: 32px;
            margin-bottom: 40px; 
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 18px 22px;
            margin-bottom: 22px; 
            border: none;
            background: #eef4fe; 
            border-radius: 12px;
            outline: none;
            color: #333;
            font-size: 16px;
        }

        input::placeholder { 
            color: #718096; 
        }

        button {
            width: 100%;
            padding: 18px;
            background-color: #4a90e2; 
            border: none;
            color: white;
            font-weight: 700;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 15px;
            margin-bottom: 35px; 
            transition: background 0.2s;
        }

        button:hover { 
            background-color: #357abd;
        }

        .switch-text { 
            font-size: 16px; 
            color: #4a5568; 
            margin-bottom: 25px;
        }

        .switch-text span { 
            color: #1a365d; 
            cursor: pointer; 
            font-weight: 700; 
            text-decoration: underline; 
        }

        .back-link { 
            display: inline-block; 
            font-size: 16px; 
            color: #4a5568; 
            text-decoration: none; 
        }

        .back-link:hover { 
            color: #000; 
        }

        .info-message {
            font-size: 14px;
            margin-top: -12px;
            margin-bottom: 15px;
            display: none;
            font-weight: 600;
            text-align: center;
        }
        .msg-error { color: #e53e3e; }
        .msg-success { color: #2f855a; }
    </style>
</head>
<body>

    <div class="login-card">
        
        <div id="loginSection">
            <h2>Masuk Akun</h2>
            <input type="text" id="loginUser" placeholder="Masukkan Username">
            <input type="password" id="loginPass" placeholder="Masukkan Password">
            
            <button onclick="prosesLogin()">Masuk</button>
            <div id="loginError" class="info-message msg-error">Username atau Password salah!</div>
            
            <p class="switch-text">Belum punya akun? <span onclick="pindahForm()">Daftar di sini</span></p>
        </div>

        <div id="registerSection" style="display: none;">
            <h2>Daftar Akun</h2>
            <input type="text" id="regUser" placeholder="Buat Username Baru">
            <input type="email" id="regEmail" placeholder="Masukkan Alamat Email"> 
            <input type="password" id="regPass" placeholder="Buat Password Baru">
            
            <button onclick="prosesRegister()">Daftar</button>
            <div id="regError" class="info-message msg-error">Semua form wajib diisi!</div>
            <div id="regSuccess" class="info-message msg-success">Daftar berhasil! Mengalihkan ke login...</div>
            
            <p class="switch-text">Sudah punya akun? <span onclick="pindahForm()">Login di sini</span></p>
        </div>

        <a href="../index.html" class="back-link">← Kembali ke Awalan</a>
    </div>

    <script>
        function pindahForm() {
            const login = document.getElementById("loginSection");
            const register = document.getElementById("registerSection");
            
            document.getElementById("loginError").style.display = "none";
            document.getElementById("regError").style.display = "none";
            document.getElementById("regSuccess").style.display = "none";

            if (login.style.display === "none") {
                login.style.display = "block";
                register.style.display = "none";
            } else {
                login.style.display = "none";
                register.style.display = "block";
            }
        }

        // FUNGSI REGISTER: Menyimpan banyak akun sekaligus di list array
        function prosesRegister() {
            const user = document.getElementById("regUser").value.trim();
            const email = document.getElementById("regEmail").value.trim();
            const pass = document.getElementById("regPass").value.trim();
            const errBox = document.getElementById("regError");
            const successBox = document.getElementById("regSuccess");

            if (user === "" || email === "" || pass === "") {
                errBox.textContent = "Semua form wajib diisi!";
                errBox.style.display = "block";
                successBox.style.display = "none";
                return;
            }

            // Ambil daftar user lama dari localStorage, kalau belum ada buat array kosong []
            let listUser = JSON.parse(localStorage.getItem("indeks_user")) || [];

            // CEK: Apakah username sudah pernah dipakai orang lain?
            const userSudahAda = listUser.some(akun => akun.username.toLowerCase() === user.toLowerCase());
            if (userSudahAda) {
                errBox.textContent = "Username ini sudah terdaftar!";
                errBox.style.display = "block";
                successBox.style.display = "none";
                return;
            }

            // Gabungkan data akun baru ke list
            listUser.push({
                username: user,
                email: email,
                password: pass
            });

            // Simpan kembali list akun yang baru ke localStorage browser
            localStorage.setItem("indeks_user", JSON.stringify(listUser));

            // Kosongkan form input pendaftaran
            document.getElementById("regUser").value = "";
            document.getElementById("regEmail").value = "";
            document.getElementById("regPass").value = "";
            
            errBox.style.display = "none";
            successBox.style.display = "block";
            
            setTimeout(pindahForm, 1000);
        }

        // FUNGSI LOGIN: Mencari username & password di dalam database list array
        function prosesLogin() {
            const userMasuk = document.getElementById("loginUser").value.trim();
            const passMasuk = document.getElementById("loginPass").value.trim();
            const errBox = document.getElementById("loginError");

            // Ambil data list akun yang terdaftar
            let listUser = JSON.parse(localStorage.getItem("indeks_user")) || [];

            // Cari apakah ada username dan password yang cocok di dalam database array
            const akunDitemukan = listUser.find(akun => akun.username === userMasuk && akun.password === passMasuk);

            if (akunDitemukan) {
                // Simpan siapa user yang sedang aktif agar dibaca index.html halaman depan
                localStorage.setItem("loggedInUser", userMasuk);
                
                // Pindah balik ke landing page utama secara silent & mulus
                window.location.href = "../index.html"; 
            } else {
                errBox.style.display = "block"; 
            }
        }
    </script>
</body>
</html>
