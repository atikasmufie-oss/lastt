<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register - BOKOBOKO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Source Sans 3', sans-serif; }
        body {
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .glass-box {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            width: 380px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            text-align: center;
        }
        h2 { color: #2b5876; margin-bottom: 25px; font-weight: 600; }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            outline: none;
            color: #333;
            font-size: 15px;
        }
        input::placeholder { color: #666; }
        button {
            width: 100%;
            padding: 14px;
            background: #4a90e2;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s ease;
        }
        button:hover { background: #357abd; transform: translateY(-2px); }
        .switch-text { margin-top: 25px; font-size: 14px; color: #444; }
        .switch-text span { color: #104f9e; cursor: pointer; font-weight: bold; text-decoration: underline; }
        .back-link { display: inline-block; margin-top: 20px; font-size: 13px; color: #555; text-decoration: none; }
        .back-link:hover { color: #000; }
    </style>
</head>
<body>

    <div class="glass-box">
        <!-- TAMPILAN MASUK (LOGIN) -->
        <div id="loginSection">
            <h2>Masuk Akun</h2>
            <input type="text" id="inputUser" placeholder="Masukkan Username">
            <input type="password" id="inputPass" placeholder="Masukkan Password">
            <button onclick="aksiLogin()">Masuk</button>
            <p class="switch-text">Belum punya akun? <span onclick="geserForm()">Daftar di sini</span></p>
        </div>

        <!-- TAMPILAN DAFTAR (REGISTER) -->
        <div id="registerSection" style="display: none;">
            <h2>Daftar Akun</h2>
            <input type="text" id="regUser" placeholder="Buat Username Baru">
            <input type="password" id="regPass" placeholder="Buat Password Baru">
            <button onclick="aksiRegister()">Daftar</button>
            <p class="switch-text">Sudah punya akun? <span onclick="geserForm()">Login di sini</span></p>
        </div>

        <a href="../index.html" class="back-link">← Kembali ke Awalan</a>
    </div>

    <script>
        // Fungsi pindah-pindah form daftar & login
        function geserForm() {
            const formLogin = document.getElementById("loginSection");
            const formReg = document.getElementById("registerSection");
            if(formLogin.style.display === "none") {
                formLogin.style.display = "block";
                formReg.style.display = "none";
            } else {
                formLogin.style.display = "none";
                formReg.style.display = "block";
            }
        }

        // Fungsi Simpan Pendaftaran Akun Baru
        function aksiRegister() {
            const u = document.getElementById("regUser").value;
            const p = document.getElementById("regPass").value;

            if(!u || !p) {
                alert("Form tidak boleh ada yang kosong!");
                return;
            }

            localStorage.setItem("saved_username", u);
            localStorage.setItem("saved_password", p);
            alert("Akunmu berhasil terdaftar! Silakan coba login.");
            geserForm();
        }

        // Fungsi Cek Login + Balik Otomatis ke Landing Page Utama
        function aksiLogin() {
            const userMasuk = document.getElementById("inputUser").value;
            const passMasuk = document.getElementById("inputPass").value;

            const userTerdaftar = localStorage.getItem("saved_username");
            const passTerdaftar = localStorage.getItem("saved_password");

            if (userMasuk === userTerdaftar && passMasuk === passTerdaftar && userTerdaftar !== null) {
                alert("Login Berhasil! Membuka halaman utama...");
                
                // Simpan nama agar terbaca di halaman depan
                localStorage.setItem("loggedInUser", userMasuk);
                
                // KELUAR FOLDER LOGIN DAN BALIK KE INDEX LANDING PAGE UTAMA
                window.location.href = "../index.html"; 
            } else {
                alert("Maaf, Username atau Password salah!");
            }
        }
    </script>
</body>
</html>
