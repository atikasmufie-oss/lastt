<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Akun</title>
    <style>
        /* ========================================================
           KEMBALI KE CSS ASLI KAMU (FIX STRUKTUR & TIDAK MEPEET)
           ======================================================== */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        body {
            background-color: #a9cfff; /* Warna biru muda sesuai foto */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background-color: #d2e6ff; /* Warna dasar kotak dalam sesuai foto */
            padding: 60px 45px; /* Ditambah biar ruang atas bawah lega & ga mepet */
            border-radius: 30px; 
            width: 460px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        h2 { 
            color: #2b569a; /* Warna biru tulisan judul */
            font-size: 32px;
            margin-bottom: 40px; /* Jarak judul ke inputan lebih luas */
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 18px 22px;
            margin-bottom: 22px; /* Jarak antar inputan lega */
            border: none;
            background: #eef4fe; /* Warna inputan abu-biru muda */
            border-radius: 12px;
            outline: none;
            color: #333;
            font-size: 16px;
        }

        input::placeholder { 
            color: #718096; 
        }

        button {
            width: 100%;
            padding: 18px;
            background-color: #4a90e2; /* Warna tombol biru asli */
            border: none;
            color: white;
            font-weight: 700;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 15px;
            margin-bottom: 35px; /* Jarak tombol ke tulisan bawah */
            transition: background 0.2s;
        }

        button:hover { 
            background-color: #357abd;
        }

        .switch-text { 
            font-size: 16px; 
            color: #4a5568; 
            margin-bottom: 25px;
        }

        .switch-text span { 
            color: #1a365d; 
            cursor: pointer; 
            font-weight: 700; 
            text-decoration: underline; 
        }

        .back-link { 
            display: inline-block; 
            font-size: 16px; 
            color: #4a5568; 
            text-decoration: none; 
        }

        .back-link:hover { 
            color: #000; 
        }

        /* Teks info/error rapi di dalam form tanpa mengacaukan layout */
        .info-message {
            font-size: 14px;
            margin-top: -12px;
            margin-bottom: 15px;
            display: none;
            font-weight: 600;
            text-align: center;
        }
        .msg-error { color: #e53e3e; }
        .msg-success { color: #2f855a; }
    </style>
</head>
<body>

    <div class="login-card">
        
        <div id="loginSection">
            <h2>Masuk Akun</h2>
            <input type="text" id="loginUser" placeholder="Masukkan Username">
            <input type="password" id="loginPass" placeholder="Masukkan Password">
            
            <button onclick="prosesLogin()">Masuk</button>
            <div id="loginError" class="info-message msg-error">Username atau Password salah!</div>
            
            <p class="switch-text">Belum punya akun? <span onclick="pindahForm()">Daftar di sini</span></p>
        </div>

        <div id="registerSection" style="display: none;">
            <h2>Daftar Akun</h2>
            <input type="text" id="regUser" placeholder="Buat Username Baru">
            <input type="email" id="regEmail" placeholder="Masukkan Alamat Email"> 
            <input type="password" id="regPass" placeholder="Buat Password Baru">
            
            <button onclick="prosesRegister()">Daftar</button>
            <div id="regError" class="info-message msg-error">Semua form wajib diisi!</div>
            <div id="regSuccess" class="info-message msg-success">Daftar berhasil! Mengalihkan ke login...</div>
            
            <p class="switch-text">Sudah punya akun? <span onclick="pindahForm()">Login di sini</span></p>
        </div>

        <a href="../index.html" class="back-link">← Kembali ke Awalan</a>
    </div>

    <script>
        function pindahForm() {
            const login = document.getElementById("loginSection");
            const register = document.getElementById("registerSection");
            
            document.getElementById("loginError").style.display = "none";
            document.getElementById("regError").style.display = "none";
            document.getElementById("regSuccess").style.display = "none";

            if (login.style.display === "none") {
                login.style.display = "block";
                register.style.display = "none";
            } else {
                login.style.display = "none";
                register.style.display = "block";
            }
        }

        function prosesRegister() {
            const user = document.getElementById("regUser").value.trim();
            const email = document.getElementById("regEmail").value.trim();
            const pass = document.getElementById("regPass").value.trim();
            const errBox = document.getElementById("regError");
            const successBox = document.getElementById("regSuccess");

            if (user === "" || email === "" || pass === "") {
                errBox.style.display = "block";
                successBox.style.display = "none";
                return;
            }

            localStorage.setItem("saved_username", user);
            localStorage.setItem("saved_email", email); 
            localStorage.setItem("saved_password", pass);

            document.getElementById("regUser").value = "";
            document.getElementById("regEmail").value = "";
            document.getElementById("regPass").value = "";
            
            errBox.style.display = "none";
            successBox.style.display = "block";
            
            // Jeda 1 detik biar user sadar kalau pendaftaran sukses, lalu pindah form otomatis tanpa alert
            setTimeout(pindahForm, 1000);
        }

        function prosesLogin() {
            const userMasuk = document.getElementById("loginUser").value.trim();
            const passMasuk = document.getElementById("loginPass").value.trim();
            const errBox = document.getElementById("loginError");

            const dbUser = localStorage.getItem("saved_username");
            const dbPass = localStorage.getItem("saved_password");

            if (userMasuk === dbUser && passMasuk === dbPass && dbUser !== null) {
                localStorage.setItem("loggedInUser", userMasuk);
                
                // LANGSUNG BALIK KE HALAMAN UTAMA (Tanpa Pop-up Alert sama sekali)
                window.location.href = "../index.html"; 
            } else {
                errBox.style.display = "block"; 
            }
        }
    </script>
</body>
</html>
